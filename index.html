<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALDIS</title>
<style>
  @font-face {
    font-family: "Libertinus Mono";
    font-style: normal;
    font-weight: 400;
    font-display: block;
    src: url("assets/fonts/LibertinusMono-Regular.ttf") format("truetype");
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #05050a;
    color: #cfd;
    font-family: "Libertinus Mono", monospace;
    overflow: hidden;
    height: 100%;
  }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    background: #0a0a14;
    display: block;
    box-shadow: 0 0 30px #0af4;
    cursor: crosshair;
    width: 1024px;
    height: 640px;
  }
  canvas.scaled {
    /* Scale the 1024x640 canvas to fit the viewport while keeping its 8:5
       aspect ratio. min() picks whichever dimension hits the edge first. */
    width: min(100vw, calc(100vh * 8 / 5));
    height: min(100vh, calc(100vw * 5 / 8));
  }
  #debug-hud {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(20,30,40,0.92);
    color: #cfd;
    padding: 8px 16px;
    font-family: "Libertinus Mono", monospace;
    font-size: 14px;
    display: none;
    gap: 18px;
    align-items: center;
    z-index: 100;
    border-top: 1px solid #4a7a9a;
  }
  #debug-hud.show { display: flex; }
  #debug-hud label { display: inline-flex; align-items: center; gap: 6px; }
  #debug-hud input[type=number] {
    width: 80px;
    background: #0a0a14;
    color: #cfd;
    border: 1px solid #4a7a9a;
    font: inherit;
    padding: 2px 4px;
  }
  #debug-hud button {
    background: #15202e;
    color: #b0d0e8;
    border: 1px solid #4a7a9a;
    font: inherit;
    padding: 4px 12px;
    cursor: pointer;
  }
  #debug-hud button:hover { background: #1e3a52; }
  #debug-hud button.on {
    background: #2a5a3a;
    color: #afffbf;
    border-color: #7fff9f;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="1024" height="640"></canvas>
</div>
<div id="debug-hud">
  <label>Difficulty:
    <input type="number" id="dbg-diff" step="0.05" min="0" max="1" value="0">
  </label>
  <label>Score:
    <input type="number" id="dbg-score" step="50" min="0" value="0">
  </label>
  <button id="dbg-end">End game</button>
  <button id="dbg-invuln">Invuln</button>
  <button id="dbg-lamp">Lamp</button>
</div>
<script src="js/morse.js"></script>
<script src="js/words.js"></script>
<script src="js/state.js"></script>
<script src="js/enemies.js"></script>
<script src="js/beam.js"></script>
<script src="js/scenes.js"></script>
<script src="js/audio.js"></script>
<script src="js/scores.js"></script>
<script src="js/debug.js"></script>
<script src="js/tutorial.js"></script>
<script src="js/story.js"></script>
<script src="js/input.js"></script>
<script src="js/render.js"></script>
<script src="js/game.js"></script>
</body>
</html>
