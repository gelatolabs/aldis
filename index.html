<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALDIS</title>
<style>
  @font-face {
    font-family: "Libertinus Mono";
    font-style: normal;
    font-weight: 400;
    font-display: block;
    src: url("assets/fonts/LibertinusMono-Regular.ttf") format("truetype");
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #05050a;
    color: #cfd;
    font-family: "Libertinus Mono", monospace;
    overflow: hidden;
    height: 100%;
  }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    background: #0a0a14;
    display: block;
    box-shadow: 0 0 30px #0af4;
    cursor: crosshair;
    width: 1024px;
    height: 640px;
  }
  canvas.scaled {
    /* Scale the 1024x640 canvas to fit the viewport while keeping its 8:5
       aspect ratio. min() picks whichever dimension hits the edge first. */
    width: min(100vw, calc(100vh * 8 / 5));
    height: min(100vh, calc(100vw * 5 / 8));
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="1024" height="640"></canvas>
</div>
<script src="js/morse.js"></script>
<script src="js/words.js"></script>
<script src="js/state.js"></script>
<script src="js/enemies.js"></script>
<script src="js/beam.js"></script>
<script src="js/scenes.js"></script>
<script src="js/audio.js"></script>
<script src="js/scores.js"></script>
<script src="js/tutorial.js"></script>
<script src="js/input.js"></script>
<script src="js/render.js"></script>
<script src="js/game.js"></script>
</body>
</html>
